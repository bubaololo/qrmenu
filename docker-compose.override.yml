services:
  app:
    build:
      target: dev
    volumes:
      - .:/var/www/html
      # PHP limits without rebuilding the image (dev xdebug layer build is slow on some hosts).
      - ./docker/php/uploads.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
    ports:
      - "8000:8000"
    # WSL2 / Linux: map host.docker.internal to the Docker host (Windows IDE listens here with Docker Desktop)
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      APP_ENV: local
      XDEBUG_MODE: develop,debug
      # discover_client_host=0: always use client_host (HTTP client IP is wrong inside Docker)
      XDEBUG_CONFIG: client_host=host.docker.internal client_port=9003 discover_client_host=0

  postgres:
    ports:
      - "5432:5432"
