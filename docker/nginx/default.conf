server {
    listen 80;
    server_name menu.test localhost;

    client_max_body_size 128m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    # Public-facing menu images. Filenames are either UUIDs (manual uploads) or
    # `item_{id}.webp` (auto-crop); URLs carry `?v={updated_at}` so `immutable`
    # is safe — replacing an image bumps the model's timestamp, busting the cache.
    location ~ ^/storage/.+\.(webp|jpe?g|png|gif|svg|avif|ico)$ {
        proxy_pass http://app:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_hide_header Cache-Control;
        proxy_hide_header Pragma;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        access_log off;
    }

    # SSE endpoints: stream events live, no buffering, no chunking gzip.
    location ~ ^/api/v1/(menu-analyses/[0-9a-f-]+|menus/[0-9]+/translations/[a-z]+)/events$ {
        proxy_pass http://app:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_cache off;
        gzip off;
        proxy_read_timeout 1h;
    }

    location / {
        proxy_pass http://app:8000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 600s;
        proxy_send_timeout 600s;
        proxy_connect_timeout 60s;
    }
}
