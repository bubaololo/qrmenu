server {
    listen 80;
    server_name menu.test localhost;

    # Match production: nginx serves static files (incl. page-cache) from the
    # app's public dir and fastcgi_passes dynamic requests to php-fpm (app:9000).
    root /var/www/html/public;
    index index.php;

    client_max_body_size 256m;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;

    gzip on;
    gzip_vary on;
    # Serve page-cache's pre-compressed *.html.gz with zero per-request gzip CPU.
    gzip_static on;

    # SSE endpoints: stream events live, no buffering, no chunking gzip.
    location ~ ^/api/v1/(menu-analyses/[0-9a-f-]+|menus/[0-9]+/translations/[a-z]+)/events$ {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $document_root/index.php;
        fastcgi_param SCRIPT_NAME /index.php;
        fastcgi_buffering off;
        gzip off;
        fastcgi_read_timeout 1h;
    }

    # Public images: nginx serves storage statically. `immutable` is safe
    # because *_url accessors append `?v={updated_at}` — replacing an image
    # bumps the model's timestamp, busting the cache even when the underlying
    # path is reused (e.g. CropMenuItemImagesJob's `item_{id}.webp`).
    location /storage/ {
        alias /var/www/storage/;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
        try_files $uri =404;
    }

    # Page-cache: serve a static public/page-cache/*.html (zero PHP) before
    # falling through to Laravel.
    location / {
        try_files $uri $uri/ /page-cache/$uri.html /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass app:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        fastcgi_read_timeout 600s;
        try_files $uri =404;
    }
}
