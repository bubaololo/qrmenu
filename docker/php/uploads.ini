; Align with Laravel validation max:10240 (10 MB per file) and Filament maxSize 10240 KB.
; upload_max_filesize: single file cap (slightly above 10 MiB for multipart overhead).
; post_max_size: whole POST body — allow several 10 MB images in one request.
upload_max_filesize = 12M
post_max_size = 128M
memory_limit = 512M
; Must be >= LLM_HTTP_TIMEOUT (max 3600 in app). Long multi-image OpenAI-compatible LLM calls.
max_execution_time = 3600
