; Align with Laravel validation max:51200 (50 MB per menu photo) and Filament maxSize 51200 KB.
; upload_max_filesize: single file cap (slightly above 50 MiB for multipart overhead).
; post_max_size: whole POST body — allow several 50 MB photos in one analyzer request.
upload_max_filesize = 52M
post_max_size = 256M
memory_limit = 512M
; Must be >= LLM_HTTP_TIMEOUT (max 3600 in app). Long multi-image OpenAI-compatible LLM calls.
max_execution_time = 3600
