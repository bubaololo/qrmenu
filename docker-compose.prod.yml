services:
  app:
    build:
      target: prod
    environment:
      APP_ENV: production
      APP_DEBUG: "false"

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - app_network
