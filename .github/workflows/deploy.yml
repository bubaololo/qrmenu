name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_KEY }}

      - name: Deploy
        env:
          HOST: ${{ secrets.SSH_HOST }}
          PORT: ${{ secrets.SSH_PORT }}
          USER: ${{ secrets.SSH_USER }}
        run: |
          set -euo pipefail
          ssh-keyscan -p "$PORT" -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

          ssh -p "$PORT" "$USER@$HOST" 'bash -seuo pipefail' <<'EOF'
          cd /srv/menu/backend

          php artisan down --render="errors::503" || true
          trap 'php artisan up || true' EXIT

          git fetch --all --prune
          git reset --hard origin/master

          composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist --no-progress

          # Public-menu assets (resources/js, resources/css) are bundled via Vite
          # and inlined by App\Support\InlineAssets, so rebuild on every deploy.
          npm ci
          npm run build

          php artisan migrate --force
          php artisan storage:link || true

          # NOTE: this box runs uncached (APP_DEBUG=true). Just drop stale compiled
          # views and reset opcache via php-fpm reload. Switch to config:cache/route:cache
          # here only once the app is confirmed env()-clean outside config/.
          php artisan view:clear

          php artisan horizon:terminate          # supervisor autorestart brings it back on new code
          sudo supervisorctl restart menu-reverb  # reverb has no graceful reload
          sudo systemctl reload php8.5-fpm        # reset opcache

          php artisan up
          trap - EXIT
          EOF

          echo "Deployed ${{ github.sha }}"
