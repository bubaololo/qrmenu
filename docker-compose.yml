services:
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${DB_DATABASE:-menu}
      POSTGRES_USER: ${DB_USERNAME:-menu}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-menu}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - app_network

  worker:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    working_dir: /var/www/html
    command: ["php", "artisan", "queue:work", "--tries=3", "--timeout=120", "--sleep=3"]
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    networks:
      - app_network

volumes:
  pgdata:

networks:
  app_network:
